<!DOCTYPE HTML>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>24点挑战 v0.4.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="用Elm构建的纯函数式24点扑克牌益智游戏 v0.4.0">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { padding: 0; margin: 0; background: #1a1a2e; overflow-x: hidden; }
    #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    .particle { position: absolute; border-radius: 50%; animation: particleBurst 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
    @keyframes particleBurst {
      0% { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--tr)); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="particles"></div>
  <div id="elm"></div>
  <script src="main.js"></script>
  <script>
    (function() {
      var today = new Date().toISOString().split('T')[0];
      var app = Elm.Main.init({ node: document.getElementById("elm"), flags: { today: today } });
      var audioCtx = null;
      var sfxEnabled = true;

      function ensureAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }
      function playTone(freq, type, duration, delay, vol) {
        if (!sfxEnabled) return;
        ensureAudio();
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol || 0.12, audioCtx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + delay);
        osc.stop(audioCtx.currentTime + delay + duration);
      }

      var SFX = {
        success: function() {
          playTone(523.25, 'sine', 0.15, 0);
          playTone(659.25, 'sine', 0.15, 0.1);
          playTone(783.99, 'sine', 0.15, 0.2);
          playTone(1046.50, 'sine', 0.35, 0.3);
        },
        error: function() {
          playTone(180, 'sawtooth', 0.25, 0, 0.08);
          playTone(140, 'sawtooth', 0.35, 0.12, 0.08);
        },
        deal: function() {
          playTone(900, 'triangle', 0.04, 0, 0.06);
          playTone(700, 'triangle', 0.05, 0.03, 0.06);
        },
        click: function() {
          playTone(1400, 'sine', 0.025, 0, 0.05);
        },
        streak: function(n) {
          var base = 440 + Math.min(n, 10) * 55;
          playTone(base, 'sine', 0.12, 0);
          playTone(base * 1.25, 'sine', 0.12, 0.08);
          playTone(base * 1.5, 'sine', 0.25, 0.16);
        },
        achievement: function() {
          playTone(880, 'sine', 0.1, 0);
          playTone(1100, 'sine', 0.15, 0.1);
          playTone(1320, 'sine', 0.3, 0.2);
        }
      };

      // Ports
      app.ports.saveToStorage.subscribe(function(json) {
        try { localStorage.setItem('24points-data', json); } catch(e) {}
      });

      // Delayed load to ensure Elm is ready
      setTimeout(function() {
        try {
          var data = localStorage.getItem('24points-data');
          if (data) app.ports.receiveFromStorage.send(data);
        } catch(e) {}
      }, 50);

      app.ports.playSound.subscribe(function(type) {
        if (!sfxEnabled) return;
        try {
          if (type === 'success') SFX.success();
          else if (type === 'error') SFX.error();
          else if (type === 'deal') SFX.deal();
          else if (type === 'click') SFX.click();
          else if (type === 'achievement') SFX.achievement();
          else if (type.startsWith('streak:')) SFX.streak(parseInt(type.split(':')[1]));
        } catch(e) {}
      });

      app.ports.copyToClipboard.subscribe(function(text) {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text).catch(function(){});
        } else {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
      });

      app.ports.setSFX.subscribe(function(enabled) {
        sfxEnabled = enabled;
        try { localStorage.setItem('24points-sfx', enabled ? '1' : '0'); } catch(e) {}
      });
      // Restore SFX setting
      try {
        var savedSFX = localStorage.getItem('24points-sfx');
        if (savedSFX !== null) sfxEnabled = savedSFX === '1';
      } catch(e) {}

      app.ports.spawnParticles.subscribe(function(count) {
        var container = document.getElementById('particles');
        var colors = ['#e94560', '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff9f45', '#c9b1ff', '#ff2e63'];
        var shapes = ['circle', 'square', 'diamond', 'star'];
        var centerX = window.innerWidth / 2;
        var centerY = window.innerHeight / 2;
        for (var i = 0; i < count; i++) {
          var p = document.createElement('div');
          p.className = 'particle';
          var angle = Math.random() * Math.PI * 2;
          var dist = 60 + Math.random() * 280;
          var rot = Math.random() * 720 - 360;
          var size = 3 + Math.random() * 12;
          var shape = shapes[Math.floor(Math.random() * shapes.length)];
          p.style.setProperty('--tx', (Math.cos(angle) * dist) + 'px');
          p.style.setProperty('--ty', (Math.sin(angle) * dist) + 'px');
          p.style.setProperty('--tr', rot + 'deg');
          p.style.left = (centerX + (Math.random() - 0.5) * 80) + 'px';
          p.style.top = (centerY + (Math.random() - 0.5) * 80) + 'px';
          p.style.width = size + 'px';
          p.style.height = size + 'px';
          var color = colors[Math.floor(Math.random() * colors.length)];
          if (shape === 'circle') {
            p.style.background = color;
          } else if (shape === 'square') {
            p.style.background = color;
            p.style.borderRadius = '0';
          } else if (shape === 'diamond') {
            p.style.background = color;
            p.style.borderRadius = '0';
            p.style.transform = 'rotate(45deg)';
          } else if (shape === 'star') {
            p.style.background = 'transparent';
            p.style.boxShadow = '0 0 0 ' + (size/3) + 'px ' + color;
            p.style.borderRadius = '0';
            p.style.transform = 'rotate(' + (Math.random() * 90) + 'deg)';
          }
          container.appendChild(p);
          setTimeout(function(el) { return function() { if (el.parentNode) el.parentNode.removeChild(el); }; }(p), 1300);
        }
      });

      // Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(function(reg) {
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                window.location.reload();
              }
            });
          });
        }).catch(function(){});
      }
    })();
  </script>
</body>
</html>
